name: Deploy Worker

on:
  push:
    branches: [master]
    paths:
      - 'worker/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 8c84992709d375b2c9bba48b7e8a2361
          workingDirectory: worker
